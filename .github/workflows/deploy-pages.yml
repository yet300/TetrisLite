name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
  PAGES_BASE_PATH: /TetrisLite/

jobs:
  build-and-deploy:
    name: Build and Deploy Web App
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build React + Kotlin/JS Web App
        run: ./gradlew :webApp:jsBrowserDistribution --no-daemon

      - name: Prepare for GitHub Pages
        run: |
          cd app/webApp/build/dist/js/productionExecutable
          # Create .nojekyll to prevent GitHub Pages from ignoring files
          touch .nojekyll
          # Inject the GitHub Pages repository base path into the built HTML.
          sed -i '0,/<head>/s#<head>#<head>\n    <base href="${{ env.PAGES_BASE_PATH }}">#' index.html
          # Enable SPA fallback on GitHub Pages
          cp index.html 404.html
          # Copy CNAME if it exists
          if [ -f ../../../../../CNAME ]; then
            cp ../../../../../CNAME .
            echo "CNAME file copied"
          fi
          # List all files to verify
          echo "Files being deployed:"
          ls -la

      - name: Show content of deployment directory
        run: |
          echo "--- Recursive listing of productionExecutable directory ---"
          ls -R app/webApp/build/dist/js/productionExecutable
          echo "---------------------------------------------------------"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: ./app/webApp/build/dist/js/productionExecutable

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}

      - name: Output deployment URL
        run: |
          echo "🚀 Deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "✅ Deployment successful!"
